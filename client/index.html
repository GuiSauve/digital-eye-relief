          "@type": "Question",
          "name": "What is the 20-20-20 rule?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The 20-20-20 rule is a guideline recommended by the American Optometric Association to reduce digital eye strain. Every 20 minutes of screen time, you should look at something 20 feet (6 meters) away for 20 seconds. This helps relax your eye muscles and reduces fatigue."
          }
        },
        {
          "@type": "Question",
          "name": "Does the 20-20-20 rule really work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, research shows the 20-20-20 rule is effective at reducing symptoms of digital eye strain. Studies indicate that taking regular breaks using this method reduces accommodation stress on eye muscles, improves tear film stability, and decreases symptoms of asthenopia (eye strain)."
          }
        },
        {
          "@type": "Question",
          "name": "What causes digital eye strain?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Digital eye strain (also called computer vision syndrome) is caused by prolonged screen use. When focusing on screens, we blink less frequently, leading to dry eyes. The constant focusing effort also fatigues eye muscles. Up to 97% of digital device users experience symptoms including eye fatigue, dryness, blurred vision, and headaches."
          }
        },
        {
          "@type": "Question",
          "name": "How does Digital Eye Relief help?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Digital Eye Relief is a free Chrome extension that automatically reminds you to take eye breaks using the 20-20-20 rule. It runs in the background, tracks your screen time, and sends gentle notifications when it's time for a break. Features include customizable timers, multiple notification styles, and optional calming sounds."
          }
        },
        {
          "@type": "Question",
          "name": "Is Digital Eye Relief free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Digital Eye Relief is completely free to use. There are no premium features, subscriptions, or hidden costs. The extension is privacy-focused and doesn't collect any personal data."
          }
        },
        {
          "@type": "Question",
          "name": "Who should use the 20-20-20 rule?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Anyone who spends extended time looking at screens can benefit from the 20-20-20 rule. This includes office workers, programmers, designers, students, gamers, and anyone who uses computers, tablets, or smartphones for prolonged periods. It's especially important for people who already experience symptoms of eye strain like dry eyes, headaches, or blurred vision."
          }
        }
      ]
